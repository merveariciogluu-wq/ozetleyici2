<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metin Özetleyici</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap');
  :root { --ink: #1a1209; --paper: #f5f0e8; --aged: #e8dfc8; --accent: #8b3a0f; --muted: #7a6e5f; --highlight: #c4923a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); font-family: 'Source Serif 4', Georgia, serif; color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 48px 24px 80px; }
  header { text-align: center; margin-bottom: 48px; animation: fadeDown 0.8s ease both; }
  .eyebrow { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); font-weight: 300; margin-bottom: 12px; }
  h1 { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(2.4rem, 5vw, 3.8rem); line-height: 1.1; }
  .subtitle { margin-top: 14px; font-size: 1rem; color: var(--muted); font-style: italic; font-weight: 300; }
  .divider { width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--accent), transparent); margin: 20px auto 0; }
  .card { width: 100%; max-width: 720px; background: #fffdf8; border: 1px solid var(--aged); border-radius: 4px; padding: 36px 40px; box-shadow: 0 2px 24px rgba(26,18,9,0.07); animation: fadeUp 0.9s ease 0.2s both; position: relative; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(to right, var(--accent), var(--highlight)); border-radius: 4px 4px 0 0; }
  label { display: block; font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; font-weight: 400; }
  textarea { width: 100%; min-height: 200px; border: 1px solid var(--aged); border-radius: 3px; background: var(--paper); padding: 16px 18px; font-family: 'Source Serif 4', Georgia, serif; font-size: 1rem; font-weight: 300; color: var(--ink); line-height: 1.75; resize: vertical; outline: none; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,58,15,0.08); }
  textarea::placeholder { color: #b0a89a; font-style: italic; }
  .char-count { text-align: right; font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }
  .options-row { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
  .option-btn { flex: 1; min-width: 120px; padding: 10px 16px; border: 1px solid var(--aged); border-radius: 3px; background: transparent; font-family: 'Source Serif 4', Georgia, serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .option-btn:hover { border-color: var(--accent); color: var(--accent); }
  .option-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .submit-btn { width: 100%; padding: 16px; background: var(--ink); color: var(--paper); border: none; border-radius: 3px; font-family: 'Playfair Display', Georgia, serif; font-size: 1.1rem; cursor: pointer; transition: all 0.25s; }
  .submit-btn:hover { background: var(--accent); transform: translateY(-1px); }
  .submit-btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }
  .loading { display: none; text-align: center; padding: 32px; color: var(--muted); font-style: italic; }
  .loading.visible { display: block; }
  .dots span { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin: 0 3px; animation: bounce 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  .result-section { margin-top: 32px; display: none; }
  .result-section.visible { display: block; }
  .result-divider { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .result-divider::before, .result-divider::after { content: ''; flex: 1; height: 1px; background: var(--aged); }
  .result-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); }
  .result-box { background: linear-gradient(135deg, #faf7f2, #f5f0e5); border: 1px solid var(--aged); border-left: 3px solid var(--accent); border-radius: 0 3px 3px 0; padding: 24px 28px; font-size: 1.05rem; line-height: 1.85; color: var(--ink); font-weight: 300; font-style: italic; }
  .copy-btn { margin-top: 12px; background: none; border: 1px solid var(--aged); border-radius: 3px; padding: 8px 20px; font-family: 'Source Serif 4', Georgia, serif; font-size: 13px; color: var(--muted); cursor: pointer; float: right; }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .error-box { background: #fff5f5; border: 1px solid #f0c0c0; border-left: 3px solid #c0392b; border-radius: 0 3px 3px 0; padding: 16px 20px; color: #7a2020; font-size: 0.95rem; margin-top: 16px; display: none; }
  .error-box.visible { display: block; }
  footer { margin-top: 48px; font-size: 12px; color: var(--muted); font-style: italic; opacity: 0.6; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
</style>
</head>
<body>
<header>
  <p class="eyebrow">Yapay Zeka ile</p>
  <h1>Metin Özetleyici</h1>
  <p class="subtitle">Uzun metinleri anında özetleyin</p>
  <div class="divider"></div>
</header>
<div class="card">
  <label for="inputText">Özetlenecek Metin</label>
  <textarea id="inputText" placeholder="Buraya özetlemek istediğiniz metni yapıştırın…" oninput="updateCount()"></textarea>
  <div class="char-count"><span id="charCount">0</span> karakter</div>
  <div class="options-row">
    <button class="option-btn active" onclick="selectMode(this,'kisa')">📝 Kısa Özet</button>
    <button class="option-btn" onclick="selectMode(this,'orta')">📄 Orta Özet</button>
    <button class="option-btn" onclick="selectMode(this,'detayli')">📚 Detaylı Özet</button>
  </div>
  <button class="submit-btn" onclick="summarize()" id="submitBtn">Metni Özetle</button>
  <div class="loading" id="loading"><div class="dots"><span></span><span></span><span></span></div><p style="margin-top:12px">Metin analiz ediliyor…</p></div>
  <div class="error-box" id="errorBox"></div>
  <div class="result-section" id="resultSection">
    <div class="result-divider"><span class="result-label">Özet</span></div>
    <div class="result-box"><p id="resultText"></p></div>
    <button class="copy-btn" onclick="copyResult()">Kopyala</button>
    <div style="clear:both"></div>
  </div>
</div>
<footer>Claude API ile çalışmaktadır · Anthropic</footer>
<script>
let selectedMode = 'kisa';
function updateCount() { document.getElementById('charCount').textContent = document.getElementById('inputText').value.length.toLocaleString('tr'); }
function selectMode(btn, mode) { document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); selectedMode = mode; }
async function summarize() {
  const text = document.getElementById('inputText').value.trim();
  if (!text || text.length < 50) { showError('Lütfen en az 50 karakterlik metin girin.'); return; }
  hideAll();
  document.getElementById('loading').classList.add('visible');
  document.getElementById('submitBtn').disabled = true;
  try {
    const response = await fetch('/api/summarize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, mode: selectedMode })
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error);
    document.getElementById('resultText').textContent = data.summary;
    document.getElementById('resultSection').classList.add('visible');
  } catch (err) { showError('Hata: ' + err.message); }
  finally { document.getElementById('loading').classList.remove('visible'); document.getElementById('submitBtn').disabled = false; }
}
function showError(msg) { const el = document.getElementById('errorBox'); el.textContent = msg; el.classList.add('visible'); }
function hideAll() { document.getElementById('errorBox').classList.remove('visible'); document.getElementById('resultSection').classList.remove('visible'); }
function copyResult() { navigator.clipboard.writeText(document.getElementById('resultText').textContent).then(() => { const btn = document.querySelector('.copy-btn'); btn.textContent = '✓ Kopyalandı'; setTimeout(() => btn.textContent = 'Kopyala', 2000); }); }
</script>
</body>
</html>
